[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── PostHog reverse proxy (first-party, EU) ──────────────────────────────────
# Serves PostHog from our own domain so ad/tracker blockers don't cut analytics.
# The static/assets rule MUST come before the catch-all: Netlify matches rules
# top-to-bottom. status = 200 + force = true makes this a true proxy (returns the
# upstream content under our domain), not a 3xx redirect. Requires the custom
# domain 8lovepatterns.com — the *.netlify.app host rewrites Content-Encoding and
# breaks PostHog parsing. Paired with api_host:'https://8lovepatterns.com/ingest'
# in posthog-init.js. Does not collide with the /api/* functions (different path).
[[redirects]]
  from = "/ingest/static/*"
  to = "https://eu-assets.i.posthog.com/static/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/ingest/*"
  to = "https://eu.i.posthog.com/:splat"
  status = 200
  force = true
