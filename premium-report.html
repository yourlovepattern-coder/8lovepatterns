<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Votre rapport premium, 8LovePatterns</title>
<meta name="robots" content="noindex"/>
<link rel="icon" href="assets/logo_mascot.png"/>

<!-- ============================================================
     GOOGLE ANALYTICS 4  .  8LovePatterns tracking pixel
     Use the SAME Measurement ID you put in index.html.
     This page also fires the "purchase" event (see bottom script).
     ============================================================ -->
<script>
  window.LP_GA_ID   = "G-XXXXXXXXXX";  /* <-- same GA4 id as index.html */
  window.LP_ADS_ID  = "";              /* <-- same Google Ads id (AW-...) if any */
  window.LP_GA_DEBUG = false;
</script>
<script>
  window.dataLayer = window.dataLayer || [];
  window.gtag = function(){ dataLayer.push(arguments); };
  (function(){
    var id = window.LP_GA_ID;
    if(!id || id.indexOf('G-') !== 0 || /X{4,}/.test(id)) return;
    var s = document.createElement('script');
    s.async = true; s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
    document.head.appendChild(s);
    gtag('js', new Date());
    gtag('config', id, { send_page_view: false });
    if (window.LP_ADS_ID) gtag('config', window.LP_ADS_ID);
  })();
</script>
<script src="analytics.js"></script>

<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { background: var(--paper); font-family: var(--font-body); color: var(--ink); }
  button { font-family: inherit; cursor: pointer; }
  ::selection { background: var(--corail); color:#fff; }

  .lp-rep-wrap { max-width: 900px; margin: 0 auto; padding: 0 clamp(20px,5vw,40px); }
  .lp-rep-hero { padding: clamp(28px,5vw,56px) 0 clamp(24px,4vw,40px); }
  .lp-rep-kicker { display:inline-block; font-size:.72rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; }

  /* Top bar */
  .lp-topbar { position: sticky; top:0; z-index:20; background: color-mix(in srgb, var(--paper) 88%, transparent);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom:1px solid var(--hairline); }
  .lp-topbar-in { max-width: 900px; margin:0 auto; padding: 12px clamp(20px,5vw,40px); display:flex; align-items:center; justify-content:space-between; gap:16px; }
  .lp-brand { display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:800; color:var(--encre); text-decoration:none; font-size:1.05rem; letter-spacing:-.01em; }
  .lp-brand img { width:30px; height:30px; }
  .lp-topbar-actions { display:flex; align-items:center; gap:10px; }
  .lp-tb-btn { display:inline-flex; align-items:center; gap:7px; border:1px solid var(--hairline); background:var(--surface); color:var(--ink-2);
    border-radius:var(--r-pill); padding:8px 15px; font-weight:600; font-size:.86rem; text-decoration:none; }
  .lp-tb-btn:hover { color:var(--encre); border-color:var(--ink-3); }
  .lp-tb-btn.solid { background:var(--encre); color:#fff; border-color:var(--encre); }

  /* Buttons */
  .lp-btn { display:inline-flex; align-items:center; gap:8px; border:none; border-radius:var(--r-pill);
    padding:14px 24px; font-weight:700; font-size:1rem; background:var(--corail); color:#fff; box-shadow:var(--sh-sm); text-decoration:none; }
  .lp-btn.ghost { background:transparent; color:var(--encre); box-shadow:none; border:1.5px solid var(--hairline); }
  .lp-btn:hover { filter:brightness(1.04); }

  /* Empty state */
  .lp-empty { max-width:560px; margin:0 auto; padding:clamp(60px,12vw,120px) clamp(20px,5vw,40px); text-align:center; }
  .lp-empty-icon { width:74px; height:74px; margin:0 auto 24px; border-radius:50%; display:grid; place-items:center; background:var(--paper-2); color:var(--ink-3); }

  /* Closing actions */
  .lp-rep-actions { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; padding:40px 0 80px; }

  @media print {
    .lp-topbar, .lp-rep-actions { display:none !important; }
    body { background:#fff; }
    .lp-report section, .lp-report p, .lp-report h3 { break-inside: avoid-page; }
  }
  @media (max-width: 720px) {
    .lp-herogrid { grid-template-columns: 1fr !important; }
    .lp-herogrid > div:last-child { justify-self:start; }
    .lp-dim-row { grid-template-columns: 1fr 60px !important; }
    .lp-dim-row > :nth-child(2) { grid-column: 1 / -1; order: 3; }
    .lp-compat-grid { grid-template-columns: 1fr !important; }
    .lp-refs-grid { grid-template-columns: 1fr !important; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition-duration:.01ms !important; animation-duration:.01ms !important; } }
</style>
</head>
<body>

<header class="lp-topbar">
  <div class="lp-topbar-in">
    <a class="lp-brand" href="index.html">
      <img src="assets/logo_mascot.png" alt=""/>
      8LovePatterns
    </a>
    <div class="lp-topbar-actions">
      <button class="lp-tb-btn" id="lp-print-top">Imprimer</button>
      <a class="lp-tb-btn solid" href="index.html">Refaire le test</a>
    </div>
  </div>
</header>

<main id="report"></main>

<!-- authored report content (one file per profile) -->
<script src="profiles.js"></script>
<script src="premium-data/incendiaire.js"></script>
<script src="premium-data/bastion.js"></script>
<script src="premium-data/cameleon.js"></script>
<script src="premium-data/fugitif.js"></script>
<script src="premium-data/guetteur.js"></script>
<script src="premium-data/miroir.js"></script>
<script src="premium-data/sauveur.js"></script>
<script src="premium-data/alchimiste.js"></script>
<!-- renderer -->
<script src="premiumReport.js"></script>
<script>
(function () {
  var genMode = new URLSearchParams(location.search).get('gen') === '1';

  /* Analytics: tell GA this dedicated page was viewed (send_page_view is off).
     Skipped in gen mode: this is an invisible iframe building the PDF, not a real view. */
  try {
    if (!genMode && typeof window.gtag === 'function') window.gtag('event', 'page_view', {
      page_title: '8LovePatterns . Premium report', page_path: '/premium-report'
    });
  } catch (e) {}

  /* ---- TEST MODE -------------------------------------------------------
     Set to true to always load a sample Incendiaire result, even if the
     visitor has not taken the test. Leave false in production.            */
  var testMode = false;

  function emptyState(){
    var wrap = document.createElement('div');
    wrap.className = 'lp-empty';
    wrap.innerHTML =
      '<div class="lp-empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div>' +
      '<h1 class="lp-h2" style="color:var(--encre);margin:0 0 12px;">Nous n\u2019avons pas trouvé vos résultats</h1>' +
      '<p class="lp-lead" style="margin:0 0 28px;">Veuillez refaire le questionnaire pour générer votre rapport premium.</p>' +
      '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
        '<a class="lp-btn" href="index.html">Refaire le questionnaire</a>' +
        '<button class="lp-btn ghost" id="lp-demo">Voir un exemple de rapport</button>' +
      '</div>';
    return wrap;
  }

  function actionsBar(){
    var bar = document.createElement('div');
    bar.className = 'lp-rep-wrap lp-rep-actions';
    bar.innerHTML =
      '<button class="lp-btn" id="lp-print">Télécharger / imprimer mon rapport</button>' +
      '<a class="lp-btn ghost" href="index.html">Refaire le questionnaire</a>';
    return bar;
  }

  function postPdf(pdf){ try { parent.postMessage({ type: 'lp_pdf', pdf: pdf }, '*'); } catch (e) {} }
  function loadHtml2pdf(cb){
    if (window.html2pdf) return cb(true);
    var s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js';
    s.onload = function () { cb(true); };
    s.onerror = function () { cb(false); };
    document.head.appendChild(s);
  }
  /* GEN MODE: invisible iframe opened at checkout. Render the buyer's real
     report, turn it into a PDF, and hand the base64 back to the parent page.
     No analytics, no on-screen chrome. */
  /* html2canvas (bundled in html2pdf) cannot parse modern CSS color functions
     (color-mix resolves to color(srgb ...)). Flatten every resolved color to
     plain rgb()/rgba() on the live nodes before the PDF clone reads them. */
  function lpConvColorFns(v){
    return v.replace(/color\(srgb\s+([0-9.]+)\s+([0-9.]+)\s+([0-9.]+)(?:\s*\/\s*([0-9.]+))?\s*\)/g, function (_, r, g, b, a) {
      var R = Math.round(parseFloat(r) * 255), G = Math.round(parseFloat(g) * 255), B = Math.round(parseFloat(b) * 255);
      return (a != null && a !== '') ? ('rgba(' + R + ',' + G + ',' + B + ',' + a + ')') : ('rgb(' + R + ',' + G + ',' + B + ')');
    });
  }
  function lpFlattenColors(root){
    var props = ['color', 'backgroundColor', 'backgroundImage', 'borderTopColor', 'borderRightColor', 'borderBottomColor', 'borderLeftColor', 'outlineColor', 'boxShadow', 'fill', 'stroke'];
    var all = [root].concat(Array.prototype.slice.call(root.querySelectorAll('*')));
    all.forEach(function (el) {
      var cs = window.getComputedStyle(el);
      props.forEach(function (p) {
        var v = cs[p];
        if (v && v.indexOf('color(') !== -1) { try { el.style[p] = lpConvColorFns(v); } catch (e) {} }
      });
    });
  }

  function renderForPdf(){
    var data = window.LP_loadResultData();
    if (!data) { postPdf(null); return; }
    var mount = document.getElementById('report');
    mount.innerHTML = '';
    var el = window.generatePremiumReport(data);
    mount.appendChild(el);
    lpFlattenColors(el);
    loadHtml2pdf(function (ok) {
      if (!ok || !window.html2pdf) { postPdf(null); return; }
      var opt = {
        margin: 10,
        image: { type: 'jpeg', quality: 0.82 },
        html2canvas: { scale: 1.5, useCORS: true, backgroundColor: '#ffffff', windowWidth: 900 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: { mode: ['css', 'legacy'] }
      };
      window.html2pdf().set(opt).from(el).toPdf().output('datauristring').then(function (uri) {
        var comma = uri.indexOf(',');
        postPdf(comma >= 0 ? uri.slice(comma + 1) : null);
      }).catch(function () { postPdf(null); });
    });
  }

  function render(){
    if (genMode) { renderForPdf(); return; }
    var mount = document.getElementById('report');
    mount.innerHTML = '';

    var params = new URLSearchParams(location.search);
    var data;
    if (params.get('demo') === '1' || testMode) data = window.LP_DEMO_RESULT;
    else data = window.LP_loadResultData();

    if (!data) {
      mount.appendChild(emptyState());
      var demoBtn = document.getElementById('lp-demo');
      if (demoBtn) demoBtn.addEventListener('click', function () {
        try { localStorage.setItem(window.LP_RESULT_KEY, JSON.stringify(window.LP_DEMO_RESULT)); } catch(e){}
        render();
      });
      return;
    }

    /* ---- Analytics: fire the "purchase" once per transaction --------------
       The buyer reached their paid report. We use the transaction id minted at
       checkout, and a per-id flag so a page refresh never double counts. */
    if (!params.get('demo') && !testMode) {
      try {
        var txid = localStorage.getItem('lp_txid') || ('lp_' + Date.now());
        var flag = 'lp_purchase_logged_' + txid;
        if (!localStorage.getItem(flag)) {
          var pcode = localStorage.getItem('lp_tx_code') || (data && data.dominant) || '';
          var item = window.LP_reportItem ? window.LP_reportItem(pcode)
            : { item_id:'report_'+pcode, item_name:'Premium report', price:9, quantity:1 };
          if (window.LP_track) window.LP_track('purchase', {
            transaction_id: txid, currency: 'EUR', value: 9, items: [ item ]
          });
          localStorage.setItem(flag, '1');
        }
      } catch (e) {}
    }

    mount.appendChild(window.generatePremiumReport(data));
    mount.appendChild(actionsBar());
    var pb = document.getElementById('lp-print');
    if (pb) pb.addEventListener('click', function () { window.print(); });
  }

  document.getElementById('lp-print-top').addEventListener('click', function () { window.print(); });
  render();
})();
</script>
</body>
</html>
