<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { background: var(--paper); font-family: var(--font-body); color: var(--ink); }
  button { font-family: inherit; }
  ::selection { background: var(--corail); color:#fff; }

  /* Tweakable: display-type personality (Voice) responds to --lp-* vars */
  .lp-display { font-weight: var(--lp-display-weight, 800); letter-spacing: var(--lp-display-tracking, -0.02em); }
  .lp-h1, .lp-h2 { font-weight: var(--lp-head-weight, 700); letter-spacing: var(--lp-display-tracking, -0.015em); }

  /* 16P-style scale dots: fill on hover with their own color */
  .lp-scale-dot:hover { background: color-mix(in srgb, var(--dot-c) 18%, transparent) !important; }

  /* Editable profile prose (content from profiles_content.js) */
  .lp-prose-doc { white-space:pre-wrap; font-family:var(--font-body); font-size:20px; line-height:1.74;
    color:var(--ink); text-wrap:pretty; }
  .lp-editable:focus { outline:none; }
  .lp-prose-rich h2 { font-family:var(--font-display); font-size:2.1rem; font-weight:800; color:var(--prof);
    margin:1.2em 0 .4em; line-height:1.2; }
  .lp-prose-rich .hook { border-left:5px solid var(--prof); padding-left:24px; margin:0 0 1.4em;
    font-family:var(--font-display); font-size:1.85rem; line-height:1.32; color:var(--prof); font-weight:700; text-wrap:pretty; }
  .lp-prose-rich p { font-size:20px; line-height:1.72; color:var(--ink); margin:0 0 1.05em; text-wrap:pretty; }
  .lp-prose-rich p.lead { font-size:1.4rem; line-height:1.55; }
  .lp-prose-rich h3 { font-family:var(--font-display); font-size:1.8rem; font-weight:700; color:var(--prof);
    margin:1.7em 0 .55em; line-height:1.3; }
  .lp-prose-rich .listbox { background:color-mix(in srgb, var(--prof) 9%, #fff);
    border:1px solid color-mix(in srgb, var(--prof) 26%, #fff); border-radius:var(--r-lg); padding:26px 30px; margin:1.9em 0; }
  .lp-prose-rich .listbox h3 { margin:0 0 .6em; font-size:1.5rem; }
  .lp-prose-rich .listbox p { font-size:1.12rem; line-height:1.66; margin:0 0 .8em; color:var(--ink); }
  .lp-prose-rich .listbox p:last-child { margin-bottom:0; }
  .lp-prose-rich .listbox ul { margin:0; padding-left:22px; }
  .lp-prose-rich .listbox li { font-size:1.18rem; line-height:1.6; margin:0 0 10px; color:var(--ink); }
  .lp-prose-rich .msg { background:var(--or-soft); border:1px solid #EADfc4; border-radius:var(--r-lg); padding:24px 28px; margin:1.9em 0; }
  .lp-prose-rich .msg h3 { color:#8A6516; margin:0 0 .5em; font-size:1.5rem; }
  .lp-prose-rich .msg p { color:#7A5C18; }

  /* ---- Patterns constellation (cast lineup, 16P-inspired) ---- */
  .lp-cast {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: clamp(12px, 1.5vw, 22px);
    align-items: stretch;
  }
  .lp-cast-tile {
    position: relative;
    appearance: none;
    border: 1px solid var(--tile-edge);
    cursor: pointer;
    border-radius: 28px;
    overflow: hidden;
    min-height: clamp(300px, 33vw, 430px);
    padding: 0;
    background: var(--tile-grad);
    box-shadow: var(--sh-xs);
    transition: transform .28s cubic-bezier(.22,.61,.36,1), box-shadow .28s, border-color .28s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    flex-direction: column;
  }
  .lp-cast-tile:hover,
  .lp-cast-tile:focus-visible {
    transform: translateY(-9px);
    box-shadow: var(--sh-lg);
    border-color: var(--fam);
    outline: none;
  }
  .lp-cast-fig {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 88px;
    z-index: 1;
    pointer-events: none;
  }
  .lp-cast-fig img {
    height: 82%;
    width: auto;
    max-width: 90%;
    object-fit: contain;
    transform-origin: bottom center;
    filter: drop-shadow(0 16px 18px rgba(20,16,45,.20));
    transition: transform .32s cubic-bezier(.22,.61,.36,1);
  }
  .lp-cast-tile:hover .lp-cast-fig img,
  .lp-cast-tile:focus-visible .lp-cast-fig img { transform: scale(1.06); }
  .lp-cast-label {
    position: relative;
    z-index: 2;
    margin-top: auto;
    padding: 14px clamp(15px,1.4vw,21px) clamp(17px,1.5vw,21px);
  }
  .lp-cast-label::before {
    content: '';
    position: absolute;
    left: 0; right: 0; bottom: 0; top: -46px;
    background: linear-gradient(to top, var(--tile-foot) 56%, transparent);
    z-index: -1;
    pointer-events: none;
  }
  .lp-cast-fam {
    display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    font-size: .68rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
    color: var(--fam);
  }
  .lp-cast-name {
    font-family: var(--font-display); font-weight: 700;
    font-size: clamp(1.18rem, .9rem + .7vw, 1.5rem); line-height: 1.1;
    color: var(--ink); margin: 6px 0 0; letter-spacing: -.01em;
  }
  .lp-cast-tag {
    margin: 5px 0 0; color: var(--ink-2); font-size: .92rem; line-height: 1.42; text-wrap: pretty;
  }
  .lp-cast-go {
    position: absolute; top: 16px; right: 16px; z-index: 3;
    width: 38px; height: 38px; border-radius: 50%;
    display: grid; place-items: center;
    background: #fff; color: var(--fam);
    box-shadow: var(--sh-sm);
    opacity: 0; transform: translateY(-4px) scale(.9);
    transition: opacity .26s, transform .26s;
  }
  .lp-cast-tile:hover .lp-cast-go,
  .lp-cast-tile:focus-visible .lp-cast-go { opacity: 1; transform: translateY(0) scale(1); }
  /* Anchor — the center the others orbit */
  .lp-cast-tile.is-anchor::after {
    content: '';
    position: absolute; z-index: 0;
    left: 50%; top: 12%; width: 78%; aspect-ratio: 1; transform: translateX(-50%);
    border-radius: 50%;
    background: radial-gradient(circle at center, color-mix(in srgb, var(--fam) 32%, transparent) 0%, transparent 68%);
    pointer-events: none;
  }
  .lp-cast-tile.is-anchor .lp-cast-fig img { height: 90%; }
  .lp-cast-chip {
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    padding: 4px 11px 4px 8px; border-radius: var(--r-pill);
    background: color-mix(in srgb, var(--fam) 16%, #fff);
    color: var(--fam); font-size: .68rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
    margin-bottom: 7px;
  }

  /* Family legend strip */
  .lp-fam-legend {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 11px 24px;
    margin: 0 auto clamp(30px,4vw,46px); max-width: 820px;
  }
  .lp-fam-legend > div { display: inline-flex; align-items: center; gap: 9px; white-space: nowrap; }

  /* Responsive */
  @media (max-width: 900px) {
    .lp-cast { grid-template-columns: 1fr 1fr; }
    .lp-cast-tile.is-anchor { grid-column: 1 / -1; order: -1; min-height: clamp(260px,44vw,330px); }
    .lp-cast-tile.is-anchor .lp-cast-fig { padding-bottom: 76px; }
  }
  @media (max-width: 900px) {
    .lp-desktop-nav { display:none !important; }
    .lp-burger-wrap { display:flex !important; }
    .lp-hero-float { display:none !important; }
    .lp-hero-grid { grid-template-columns: 1fr !important; gap:36px !important; }
    .lp-mech-grid { grid-template-columns: 1fr 1fr !important; }
    .lp-2col { grid-template-columns: 1fr !important; }
    .lp-footer-grid { grid-template-columns: 1fr 1fr !important; }
    .lp-pricing-grid { grid-template-columns: 1fr !important; }
    .lp-profile-head { grid-template-columns: 1fr !important; text-align:center; justify-items:center; }
    .lp-profile-head > div { text-align:center; }
  }
  @media (max-width: 640px) {
    .lp-sales-feat { grid-template-columns: 1fr !important; }
  }
  @media (max-width: 560px) {
    .lp-cast { grid-template-columns: 1fr; }
    .lp-cast-tile.is-anchor { grid-column: auto; }
    .lp-mech-grid { grid-template-columns: 1fr !important; }
    .lp-footer-grid { grid-template-columns: 1fr !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
  }
</style>
</head>
